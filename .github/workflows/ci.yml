name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
          - os: macos-latest
            compiler: appleclang
            cc: clang
            cxx: clang++

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTDIOBUS_BUILD_TESTS=ON \
            -DSTDIOBUS_BUILD_EXAMPLES=ON \
            -DSTDIOBUS_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (unit only)
        run: ctest --test-dir build --output-on-failure --timeout 60 -E "^(E2E/|Conformance/)"

  sanitizers:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: ["address,undefined", "thread"]

    name: Sanitizer / ${{ matrix.sanitizer }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSTDIOBUS_BUILD_TESTS=ON \
            -DSTDIOBUS_BUILD_EXAMPLES=OFF \
            -DSTDIOBUS_SANITIZER=${{ matrix.sanitizer }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (unit only)
        run: ctest --test-dir build --output-on-failure --timeout 120 -E "^(E2E/|Conformance/)"

  format-check:
    runs-on: ubuntu-24.04
    name: Format Check
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: ./scripts/format.sh --check

  install-test:
    runs-on: ubuntu-24.04
    name: Install & find_package

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build and install
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DSTDIOBUS_BUILD_TESTS=OFF -DSTDIOBUS_BUILD_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build build --parallel
          cmake --install build

      - name: Test find_package
        run: |
          mkdir -p /tmp/test_find
          cat > /tmp/test_find/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.14)
          project(test_find CXX)
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          find_package(stdiobus CONFIG REQUIRED)
          add_executable(test_app main.cpp)
          target_link_libraries(test_app PRIVATE stdiobus::stdiobus)
          EOF
          cat > /tmp/test_find/main.cpp << 'EOF'
          #include <stdiobus/version.hpp>
          int main() {
              return stdiobus::version_major() == 1 ? 0 : 1;
          }
          EOF
          cmake -S /tmp/test_find -B /tmp/test_find/build \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install
          cmake --build /tmp/test_find/build
